<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <title>Quiz Zone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <div class="card">

    <h1>🎯 Quiz Zone</h1>

    <!-- Google login -->
    <div id="login">
      <button id="googleLogin">🔑 Влез с Google</button>
    </div>

    <!-- Logout бутон -->
    <div id="logoutContainer" class="hidden">
      <button id="logoutBtn">🚪 Изход</button>
    </div>

    <!-- Категории -->
    <div id="categories" class="hidden">
      <button onclick="startQuiz('tech')">💻 Компютърни умения</button>
      <button onclick="startQuiz('internet')">🌐 Интернет</button>
      <button onclick="startQuiz('friendship')">❤️ Приятелство</button>
    </div>

    <!-- Куиз -->
    <div id="quiz" class="hidden">
      <h2 id="question"></h2>
      <div id="answers"></div>
    </div>

    <!-- Резултат -->
    <div id="result" class="hidden">
      <h2 id="score"></h2>
      <button onclick="location.reload()">🔄 Опитай отново</button>
    </div>

  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
