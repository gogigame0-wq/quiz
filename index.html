<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <title>Quiz Zone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <div class="card">

    <h1>🎯 Quiz Zone</h1>

    <!-- Login -->
    <div id="login">
      <button id="googleLogin">🔑 Влез с Google</button>
    </div>

    <!-- Logout -->
    <div id="logoutContainer" class="hidden">
      <button id="logoutBtn">🚪 Изход</button>
    </div>

    <!-- Categories -->
    <div id="categories" class="hidden">
      <button onclick="startQuiz('tech')">💻 Компютри</button>
      <button onclick="startQuiz('internet')">🌐 Интернет</button>
      <button onclick="startQuiz('friendship')">❤️ Приятелство</button>
      <button onclick="startQuiz('games')">🎮 Игри</button>
      <button onclick="startQuiz('movies')">🎬 Филми</button>
      <button onclick="startQuiz('music')">🎵 Музика</button>
      <button onclick="startQuiz('sports')">⚽ Спорт</button>
      <button onclick="startQuiz('general')">🌍 Обща култура</button>
    </div>

    <!-- Quiz -->
    <div id="quiz" class="hidden">
      <h2 id="question"></h2>
      <div id="answers"></div>
    </div>

    <!-- Result -->
    <div id="result" class="hidden">
      <h2 id="score"></h2>
      <button onclick="location.reload()">🔄 Отново</button>
    </div>

  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
